<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>2026 Masters Pool</title>
<style>

  .tab:hover{background:#ede8de}
  .tab.active{color:#1a4a2e;border-bottom-color:#1a4a2e;font-weight:600;background:#ede8de}
  .section{display:none}.section.active{display:block}
  .card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:16px}
  .card h2{font-size:16px;font-weight:600;margin-bottom:14px;color:#1a4a2e}
  label{font-size:13px;color:#555;display:block;margin-bottom:4px}
  input[type=number],input[type=text]{padding:7px 10px;font-size:14px;border:1px solid #ccc;border-radius:7px;background:#fff;color:#1a1a1a;font-family:inherit;transition:border-color 0.15s}
  input:focus{outline:none;border-color:#1a4a2e;box-shadow:0 0 0 2px rgba(26,74,46,0.1)}
  input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1a4a2e}
  button{padding:8px 16px;font-size:13px;border:1px solid #ccc;border-radius:7px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:all 0.15s}
  button:hover{background:#f0f0f0}
  button.primary{background:#1a4a2e;color:#fff;border-color:#1a4a2e}
  button.primary:hover{background:#163d25}
  button.danger{color:#c0392b;border-color:#f0c0bb}
  button.danger:hover{background:#fdf0ee}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:9px 8px;color:#666;font-weight:600;border-bottom:1.5px solid #e5e0d5;white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
  td{padding:9px 8px;border-bottom:1px solid #f0ece4;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#faf8f4}
  .score-pos{color:#c0392b;font-weight:500}
  .score-neg{color:#1a7a4a;font-weight:500}
  .score-e{color:#888}
  .cut-badge{font-size:10px;padding:1px 5px;border-radius:6px;background:#fde8e8;color:#a32d2d;margin-left:3px;font-weight:600}
  .rank-gold{color:#b8860b;font-weight:700;font-size:15px}
  .incomplete-badge{font-size:11px;color:#c0392b;background:#fde8e8;padding:2px 7px;border-radius:10px;margin-left:6px}
  .tag{display:inline-block;background:#f0ece4;border-radius:12px;padding:2px 9px;font-size:11px;margin:2px;color:#444}
  .player-list{max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:8px}
  .player-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f5f5f5}
  .player-item:last-child{border-bottom:none}
  .player-item:hover{background:#f5f8f5}
  .player-item.banned{opacity:0.3;pointer-events:none}
  .player-item.selected{background:#f0f7f2}
  .sel-tag{display:inline-flex;align-items:center;gap:5px;background:#e8f2eb;border:1px solid #b8d8c0;border-radius:20px;padding:4px 10px;font-size:12px;margin:2px;color:#1a4a2e}
  .sel-tag button{border:none;background:none;padding:0;cursor:pointer;font-size:15px;color:#666;line-height:1}
  .sel-tag button:hover{color:#c0392b;background:none}
  .odds-tag{font-size:11px;color:#888}
  .net-input{width:65px;text-align:center}
  .score-sm{width:70px;text-align:center}
  .admin-gate{text-align:center;padding:40px 20px}
  .admin-gate input{width:220px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;text-align:center}
  .admin-gate p{font-size:13px;color:#888;margin-bottom:16px}
  .grid-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .stat{background:#f5f8f5;border-radius:8px;padding:14px;text-align:center;border:1px solid #d0e8d8}
  .stat-label{font-size:12px;color:#666;margin-bottom:4px}
  .stat-val{font-size:24px;font-weight:600;color:#1a4a2e}
  .notice{background:#fffbe6;border:1px solid #e8d88a;border-radius:8px;padding:12px 16px;font-size:13px;color:#7a6010;margin-bottom:16px}
  .picked-by{font-size:11px;color:#888}
  .leaderboard-note{font-size:12px;color:#888;margin-top:12px;font-style:italic}
  @media(max-width:600px){
    .grid-stats{grid-template-columns:1fr 1fr}
    th,td{padding:7px 4px;font-size:12px}
    header{flex-direction:column;align-items:flex-start;gap:4px}
  }
</style>
</head>

<header>

      <div id="atab-scores" class="section"></div>
    </div>
  </div>

</div>

// ── STATE ────────────────────────────────────────────────────────────────────
let proScores = {
  'Cameron Young':      {score:-10, cut:false},
  'Justin Rose':        {score:-10, cut:false},
  'Collin Morikawa':    {score:-9,  cut:false},
  'Sam Burns':          {score:-9,  cut:false},
  'Xander Schauffele':  {score:-8,  cut:false},
  'Jordan Spieth':      {score:-5,  cut:false},

  'Matt Fitzpatrick':   {score:-4,  cut:false},
  'Ludvig Åberg':       {score:-3,  cut:false},
  'Chris Gotterup':     {score:-2,  cut:false},
  'Tommy Fleetwood':    {score:0,   cut:false},
  'Jon Rahm':           {score:1,   cut:false},
  'Sungjae Im':         {score:3,   cut:false},
  'Marco Penge':        {score:6,   cut:false},
  'J.J. Spaun':         {score:5,   cut:true},
  'Bryson DeChambeau':  {score:6,   cut:true},
  'Robert MacIntyre':   {score:7,   cut:true},
};
let adminUnlocked = false;
let editingIdx = null;
let editSelected = [];
let editSearch = '';
let currentAdminTab = 'nets';

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtScore(s) {
  if (s === null || s === undefined) return '—';
  if (s === 0) return 'E';
  return s > 0 ? '+' + s : '' + s;
}
function scClass(s) {
  if (s === null || s === undefined || s === 0) return 'score-e';
  return s > 0 ? 'score-pos' : 'score-neg';
}
function getProScore(name) {
  const d = proScores[name];
  if (!d) return 0;
  return d.cut ? (d.score || 0) + MISSED_CUT_PENALTY : (d.score || 0);
}
function prosTotal(p) {
  return p.pros.reduce((a, n) => a + getProScore(n), 0);
}
function totalScore(p) {
  if (p.pros.length < 3) return null;
  return (p.net || 0) + prosTotal(p);
}

// ── ODDS ORDER for sorting pros display ──────────────────────────────────────
const ODDS_ORDER = ['Jon Rahm','Bryson DeChambeau','Xander Schauffele','Ludvig Åberg','Matt Fitzpatrick',
  'Cameron Young','Tommy Fleetwood','Justin Rose','Hideki Matsuyama','Collin Morikawa','Robert MacIntyre',
  'Min Woo Lee','Patrick Reed','Brooks Koepka','Chris Gotterup','Russell Henley','Si Woo Kim','Jordan Spieth',
  'Viktor Hovland','Shane Lowry','Nicolai Højgaard','Jake Knapp','Justin Thomas','Akshay Bhatia',
  'Maverick McNealy','Adam Scott','J.J. Spaun','Sam Burns','Corey Conners','Cameron Smith','Gary Woodland',
  'Sepp Straka','Brian Harman','Tyrrell Hatton','Tom Kim','Sungjae Im','Sahith Theegala','Tony Finau',
  'Jason Day','Wyndham Clark','Marco Penge','Fred Couples','Ángel Cabrera'];

function sortPros(pros) {
  return [...pros].sort((a, b) => {
    const ai = ODDS_ORDER.indexOf(a); const bi = ODDS_ORDER.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });
}

// Masters colour shading by position
function rowStyle(i) {
  if (i === 0) return 'background:#f0f7f0;'; // 1st - light green
  if (i === 1) return 'background:#f5faf5;'; // 2nd
  if (i === 2) return 'background:#faf9f0;'; // 3rd - light gold
  if (i === 3) return 'background:#fdfcf4;'; // 4th
  if (i === 4) return 'background:#fefef8;'; // 5th
  if (i === 5) return 'background:#fefefe;'; // 6th
  return '';
}

// ── LEADERBOARD ──────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const complete = participants.filter(p => p.pros.length === 3);
  const incomplete = participants.filter(p => p.pros.length < 3);
  const sorted = complete.map(p => ({...p, total: totalScore(p)})).sort((a, b) => {
    if (a.total !== b.total) return a.total - b.total;
    return (a.net || 0) - (b.net || 0);
  });

  if (sorted.length) {
    document.getElementById('stat-count').textContent = participants.length;
    document.getElementById('stat-leader').textContent = sorted[0].last;
    document.getElementById('stat-score').textContent = fmtScore(sorted[0].total);
  }

  let html = '';
  if (sorted.length) {
    const leader = sorted[0].total;
    html += `<div style="overflow-x:auto"><table><thead><tr>
      <th>#</th>
      <th>Name</th>
      <th style="text-align:right">Total</th>
      <th style="text-align:center">Wed net</th>
      <th>Pro 1</th><th>Pro 2</th><th>Pro 3</th>
      <th style="text-align:right">Winnings</th>
    </tr></thead><tbody>`;
    sorted.forEach((p, i) => {
      const pt = prosTotal(p);
      const diff = p.total - leader;
      const prize = PRIZES[i] !== undefined ? '$' + PRIZES[i] : '—';
      const prizeStyle = PRIZES[i] ? 'color:#1a7a4a;font-weight:700' : 'color:#999';
      const feeHtml = p.feePaid ? '<span style="color:#1a7a4a;font-weight:600">Yes</span>' : '<span style="color:#c0392b">No</span>';
      const borderBottom = i === 5 ? 'border-bottom:3px solid #1a4a2e;' : '';
      const orderedPros = sortPros(p.pros);
      const prosCells = orderedPros.map(n => {
        const d = proScores[n]; const isCut = d && d.cut; const s = getProScore(n);
        const lastName = n.split(' ').slice(-1)[0];
        return `<td style="font-size:12px;white-space:nowrap;${borderBottom}">${lastName}${isCut ? '<span class="cut-badge">CUT</span>' : ''} <span class="${scClass(s)}">${fmtScore(s)}</span></td>`;
      }).join('');
      html += `<tr style="${rowStyle(i)}">
        <td class="${i === 0 ? 'rank-gold' : ''}" style="width:24px;${borderBottom}">${i + 1}</td>
        <td style="font-weight:600;white-space:nowrap;${borderBottom}">${p.first} ${p.last}</td>
        <td class="${scClass(p.total)}" style="text-align:right;font-weight:700;font-size:14px;${borderBottom}">${fmtScore(p.total)}</td>
        <td class="${scClass(p.net)}" style="text-align:center;${borderBottom}">${fmtScore(p.net)}</td>
        ${prosCells}
        <td style="${prizeStyle};text-align:right;${borderBottom}">${prize}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (incomplete.length) {
    html += `<div style="margin-top:20px;font-size:13px;color:#888;font-weight:600;margin-bottom:8px">Picks not yet complete (${incomplete.length})</div>`;
    html += incomplete.map(p =>
      `<div style="padding:5px 0;font-size:13px;color:#999">${p.first} ${p.last}${p.pros.length ? ' — ' + p.pros.join(', ') : ' — no picks entered'}</div>`
    ).join('');
  }

  if (!sorted.length && !incomplete.length) html = '<div style="color:#999;text-align:center;padding:2rem">No data yet.</div>';
  document.getElementById('lb-content').innerHTML = html;
}

// ── ADMIN AUTH ───────────────────────────────────────────────────────────────
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PASSWORD) {
    adminUnlocked = true;
    document.getElementById('admin-gate').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderNets();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password.';
  }
}

// ── WEDNESDAY NETS ───────────────────────────────────────────────────────────

  participants.forEach((p, i) => {
    html += `<tr>
      <td style="color:#999">${p.id}</td>
      <td>${p.first} ${p.last}</td>
      <td style="color:#999">${p.handicap}</td>
      <td style="text-align:center">
        <select onchange="setFeePaid(${i},this.value)" style="width:70px;padding:4px 6px;font-size:13px">
          <option value="no" ${!p.feePaid?'selected':''}>No</option>
          <option value="yes" ${p.feePaid?'selected':''}>Yes</option>
        </select>
      </td>
      <td style="text-align:right"><input type="number" class="net-input" value="${p.net !== null ? p.net : ''}" placeholder="0" oninput="setNet(${i},this.value)" /></td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';
  document.getElementById('atab-nets').innerHTML = html;
}

function setNet(i, v) {
  participants[i].net = v === '' ? null : (parseInt(v) || 0);
  renderLeaderboard();
}

function setFeePaid(i, v) {
  participants[i].feePaid = (v === 'yes');
  renderLeaderboard();
}

// ── PICKS ────────────────────────────────────────────────────────────────────
function renderPicks() {
  let html = `<div class="card"><h2>Manage picks</h2>`;
  participants.forEach((p, i) => {
    const needsPicks = p.pros.length < 3;
    html += `<div style="padding:12px 0;border-bottom:1px solid #f0ece4">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <span style="font-weight:600">${p.first} ${p.last}</span>
          ${needsPicks ? '<span class="incomplete-badge">needs picks</span>' : ''}
          <div style="margin-top:5px">${p.pros.length ? p.pros.map(n => `<span class="tag">${n}</span>`).join('') : '<span style="font-size:12px;color:#999">none</span>'}</div>
        </div>
        <button onclick="startEdit(${i})">Edit</button>
      </div>
      <div id="edit-panel-${i}" style="display:none;margin-top:12px;padding:12px;background:#fafaf8;border-radius:8px;border:1px solid #e5e0d5"></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('atab-picks').innerHTML = html;
}

function startEdit(i) {
  if (editingIdx !== null && editingIdx !== i) {
    document.getElementById('edit-panel-' + editingIdx).style.display = 'none';
  }
  editingIdx = i;
  editSelected = [...participants[i].pros];
  editSearch = '';
  document.getElementById('edit-panel-' + i).style.display = 'block';
  renderEditPanel(i);
}

function renderEditPanel(i) {
  const el = document.getElementById('edit-panel-' + i);
  const filtered = ALL_PLAYERS.filter(p => p.name.toLowerCase().includes(editSearch.toLowerCase()));
  const selHtml = editSelected.map(n =>
    `<span class="sel-tag">${n}<button onclick="removeEditSel('${n.replace(/'/g,"\\'")}',${i})">×</button></span>`
  ).join('') || '<span style="font-size:12px;color:#999">none selected</span>';

  el.innerHTML = `
    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:#666;margin-bottom:5px">Selected (${editSelected.length}/3):</div>
      <div style="min-height:30px">${selHtml}</div>
    </div>
    <input type="text" placeholder="Search player..." value="${editSearch}" style="width:100%;margin-bottom:8px" oninput="handleEditSearch(this.value,${i})" />
    <div class="player-list">
      ${filtered.map(p => {
        const banned = BANNED.includes(p.name);
        const sel = editSelected.includes(p.name);
        return `<div class="player-item${banned?' banned':''}${sel?' selected':''}" onclick="toggleEditSel('${p.name.replace(/'/g,"\\'")}',${i})">
          <span>${p.name}${banned ? ' <span style="font-size:11px;color:#bbb">(not eligible)</span>' : ''}</span>
          <span class="odds-tag">${p.odds}${sel ? ' ✓' : ''}</span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
      <button class="primary" onclick="savePicks(${i})">Save picks</button>
      <button onclick="cancelEdit(${i})">Cancel</button>
      <span id="edit-msg-${i}" style="font-size:12px;color:#c0392b"></span>
    </div>`;
}

function handleEditSearch(v, i) { editSearch = v; renderEditPanel(i); }
function removeEditSel(n, i) { editSelected = editSelected.filter(x => x !== n); renderEditPanel(i); }
function toggleEditSel(n, i) {
  if (editSelected.includes(n)) { editSelected = editSelected.filter(x => x !== n); }
  else {
    if (editSelected.length >= 3) { document.getElementById('edit-msg-' + i).textContent = 'Max 3 pros.'; return; }
    editSelected.push(n);
  }
  renderEditPanel(i);
}
function savePicks(i) {
  if (editSelected.length !== 3) { document.getElementById('edit-msg-' + i).textContent = 'Select exactly 3.'; return; }
  participants[i].pros = [...editSelected];
  editSelected = []; editSearch = ''; editingIdx = null;
  renderPicks();
  renderLeaderboard();
  renderScores();
}
function cancelEdit(i) {
  editSelected = []; editSearch = ''; editingIdx = null;
  const el = document.getElementById('edit-panel-' + i);
  if (el) el.style.display = 'none';
}

// ── PRO SCORES ───────────────────────────────────────────────────────────────
function renderScores() {
  const usedPros = [...new Set(participants.flatMap(p => p.pros))].sort();
  let html = `<div class="card"><h2>Pro scores (cumulative vs par)</h2>
  <div class="notice">Update after each round. Enter the player's total score relative to par (e.g. -8 = 8 under). Check "Missed cut" to apply the +${MISSED_CUT_PENALTY} penalty.</div>`;
  if (!usedPros.length) {
    html += '<div style="color:#999;font-size:13px">No pros picked yet — add picks first.</div></div>';
    document.getElementById('atab-scores').innerHTML = html;
    return;
  }
  html += `<div style="overflow-x:auto"><table><thead><tr>
    <th>Player</th><th>Picked by</th>
    <th style="text-align:center">Missed cut</th>
    <th style="text-align:right">Score vs par</th>
    <th style="text-align:right">Effective</th>
  </tr></thead><tbody>`;
  usedPros.forEach(name => {
    const d = proScores[name] || {score: 0, cut: false};
    const pickedBy = participants.filter(p => p.pros.includes(name)).map(p => p.last).join(', ');
    const eff = d.cut ? MISSED_CUT_PENALTY : (d.score || 0);
    html += `<tr>
      <td style="font-weight:600;white-space:nowrap">${name}</td>
      <td class="picked-by">${pickedBy}</td>
      <td style="text-align:center"><input type="checkbox" ${d.cut ? 'checked' : ''} onchange="setCut('${name.replace(/'/g,"\\'")}',this.checked)"></td>
      <td style="text-align:right"><input type="number" class="score-sm" value="${d.score || 0}" ${d.cut ? 'disabled' : ''} oninput="setScore('${name.replace(/'/g,"\\'")}',this.value)" /></td>
      <td class="${scClass(eff)}" style="text-align:right;font-weight:700">${fmtScore(eff)}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';
  document.getElementById('atab-scores').innerHTML = html;
}

function setScore(name, v) {
  if (!proScores[name]) proScores[name] = {score: 0, cut: false};
  proScores[name].score = v === '' ? 0 : (parseInt(v) || 0);
  renderLeaderboard();
}
function setCut(name, v) {
  if (!proScores[name]) proScores[name] = {score: 0, cut: false};
  proScores[name].cut = v;
  renderLeaderboard();
  renderScores();
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tabs > .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.container > .tabs + .section, .container > div > .section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'leaderboard') renderLeaderboard();
}

function showAdminTab(id, btn) {
  document.querySelectorAll('#admin-content .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#admin-content .section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('atab-' + id).classList.add('active');
  if (id === 'nets') renderNets();
  if (id === 'picks') renderPicks();
  if (id === 'scores') renderScores();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderLeaderboard();
</script>
</body>
</html>
